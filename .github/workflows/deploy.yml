name: CI/CD SysInfo

on:
  push:
    branches: ["deploy"]
  pull_request:

jobs:
  ci:
    name: 🧪 Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Run Linter
        run: npm run lint

      - name: 🏗️ Build project
        run: npm run build

  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci # ⬅️ penting: deploy hanya jalan kalau CI sukses

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ~/project/sysmon

            echo "📥 Pull latest code"
            git pull live live

            echo "📦 Install dependencies"
            npm install

            echo "🏗️ Build project"
            npm run build

            echo "♻️ Restart app"
            pm2 restart sysmon || pm2 start dist/server.js --name sysmon

            echo "⏳ Waiting for app to stabilize..."
            sleep 5

            echo "🔍 Health Check"
            # Ganti 3000 dengan port aplikasi kamu
            curl -f http://localhost:3000 || (echo "❌ App crashed! Check logs below:" && pm2 logs sysmon --lines 20 --no-daemon && exit 1)
