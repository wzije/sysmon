name: CI/CD SysInfo

on:
  push:
    branches: ["live"]
  pull_request:

jobs:
  ci:
    name: 🧪 Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Run Linter
        run: npm run lint

      - name: 🏗️ Build project
        run: npm run build

  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci # ⬅️ penting: deploy hanya jalan kalau CI sukses

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/pshpac/project/sysmon

            echo "📥 Pull latest code"
            git pull origin main

            echo "📦 Install dependencies"
            npm install

            echo "🏗️ Build project"
            npm run build

            echo "♻️ Restart app"
            pm2 restart sysinfo || pm2 start dist/server.js --name sysinfo
